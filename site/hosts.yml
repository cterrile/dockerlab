# Site tools registry — which hosts receive scripts/ + site/ via push-tools.
#
# Per-host secrets use the same .env keys as site/docker-compose.yml but values
# differ per host. Store them in Infisical prod under infisical_path (default:
# /sites/<hostname>). Example for icarus:
#
#   /sites/icarus/NEWT_ID
#   /sites/icarus/NEWT_SECRET
#   /sites/icarus/PANGOLIN_ENDPOINT
#   /sites/icarus/PORTAINER_EDGE_ID
#   /sites/icarus/PORTAINER_EDGE_KEY
#
hosts:
  artemis:
    scripts_path: /home/deploy/dockerlab/scripts
    site_path: /home/deploy/dockerlab/site
    infisical_path: /sites/artemis
    secrets:
      - PANGOLIN_ENDPOINT
      - NEWT_ID
      - NEWT_SECRET
      - PORTAINER_EDGE_ID
      - PORTAINER_EDGE_KEY

  icarus:
    scripts_path: /home/deploy/dockerlab/scripts
    site_path: /home/deploy/dockerlab/site
    infisical_path: /sites/icarus
    secrets:
      - PANGOLIN_ENDPOINT
      - NEWT_ID
      - NEWT_SECRET
      - PORTAINER_EDGE_ID
      - PORTAINER_EDGE_KEY
