# Site tools registry — which hosts receive scripts/ + site/ via push-tools.
#
# Per-host secrets (for future .env render / compose deploy) use the same keys as
# site/docker-compose.yml. When enabled, store values in Infisical prod under
# infisical_path (default: /sites/<hostname>).
hosts:
  artemis:
    scripts_path: /home/deploy/dockerlab/scripts
    site_path: /home/deploy/dockerlab/site
    infisical_path: /sites/artemis
    secrets:
      - PANGOLIN_ENDPOINT
      - NEWT_ID
      - NEWT_SECRET
      - PORTAINER_EDGE_ID
      - PORTAINER_EDGE_KEY

  icarus:
    scripts_path: /home/deploy/dockerlab/scripts
    site_path: /home/deploy/dockerlab/site
    infisical_path: /sites/icarus
    secrets:
      - PANGOLIN_ENDPOINT
      - NEWT_ID
      - NEWT_SECRET
      - PORTAINER_EDGE_ID
      - PORTAINER_EDGE_KEY
