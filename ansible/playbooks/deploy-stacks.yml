---
- name: Deploy Docker Compose stack
  hosts: all
  become: true
  vars:
    deploy_stack: "{{ lookup('env', 'DEPLOY_STACK') }}"

  pre_tasks:
    - name: Validate stack parameter
      ansible.builtin.assert:
        that:
          - deploy_stack | length > 0
        fail_msg: "DEPLOY_STACK env var must be set to a stack name"
      run_once: true

    - name: Show stack to deploy
      ansible.builtin.debug:
        msg: "Deploying stack '{{ deploy_stack }}' on {{ inventory_hostname }}"

  tasks:
    - name: Deploy stack
      ansible.builtin.include_role:
        name: docker_stack
      vars:
        stack_name: "{{ deploy_stack }}"
