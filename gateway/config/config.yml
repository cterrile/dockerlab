gerbil:
    start_port: 51820
    base_endpoint: "gateway.christerrile.com"

app:
    dashboard_url: "https://gateway.christerrile.com"
    log_level: "info"
    telemetry:
        anonymous_usage: true

domains:
    domain1:
        base_domain: "christerrile.com"

server:
    secret: "{{.Secret}}"
    cors:
        origins: ["https://gateway.christerrile.com"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        allowed_headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

flags:
    require_email_verification: false
    disable_signup_without_invite: true
    disable_user_create_org: false
    allow_raw_resources: true