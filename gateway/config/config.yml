gerbil:
    start_port: 51820
    base_endpoint: "gateway.{{.DOMAIN}}"

app:
    dashboard_url: "https://gateway.{{.DOMAIN}}"
    log_level: "info"
    telemetry:
        anonymous_usage: true

domains:
    domain1:
        base_domain: "{{.DOMAIN}}"

server:
    secret: "{{.Secret}}"
    cors:
        origins: ["https://gateway.{{.DOMAIN}}"]
        methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
        allowed_headers: ["X-CSRF-Token", "Content-Type"]
        credentials: false

flags:
    require_email_verification: false
    disable_signup_without_invite: true
    disable_user_create_org: false
    allow_raw_resources: true