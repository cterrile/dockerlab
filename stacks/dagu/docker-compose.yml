services:
  dagu:
    build:
      context: ../..
      dockerfile: stacks/dagu/Dockerfile
    image: dagu-deployer:latest
    container_name: dagu
    restart: unless-stopped
    ports:
      - 8090:8090
    environment:
      - PUID=1000
      - PGID=1000
      - DAGU_HOST=0.0.0.0
      - DAGU_PORT=8090
      - DAGU_DAGS_DIR=/var/lib/dagu/dags
      - DAGU_TZ=America/Los_Angeles
      - DAGU_AUTH_MODE=builtin
      - INFISICAL_API_URL=https://infisical.${DOMAIN}
      - INFISICAL_TOKEN=${INFISICAL_TOKEN}
      - INFISICAL_PROJECT_ID=f217186f-b64f-4e05-ac49-2af700a2cc5c
      - REPO_URL=https://github.com/cterrile/dockerlab.git
      - DAGU_GITSYNC_ENABLED=true
      - DAGU_GITSYNC_REPOSITORY=https://github.com/cterrile/dockerlab.git
      - DAGU_GITSYNC_BRANCH=main
      - DAGU_GITSYNC_PATH=stacks/dagu/dags
      - DAGU_GITSYNC_PUSH_ENABLED=false
      - DAGU_GITSYNC_AUTOSYNC_ENABLED=true
      - DAGU_GITSYNC_AUTOSYNC_ON_STARTUP=true
      - DAGU_GITSYNC_AUTOSYNC_INTERVAL=300
      - DAGU_GITSYNC_AUTH_TYPE=token
      - DAGU_GITSYNC_AUTH_TOKEN=${GITHUB_TOKEN}
    volumes:
      - dagu-data:/var/lib/dagu
      - workspace:/workspace
    networks:
      - pangolin
    labels:
      # Pangolin blueprint (public resource) — see https://docs.pangolin.net/manage/blueprints
      - pangolin.public-resources.dagu.name=dagu
      - pangolin.public-resources.dagu.full-domain=ops.${DOMAIN}
      - pangolin.public-resources.dagu.protocol=http
      - pangolin.public-resources.dagu.targets[0].hostname=dagu
      - pangolin.public-resources.dagu.targets[0].port=8090
      - pangolin.public-resources.dagu.targets[0].path=/
      - pangolin.public-resources.dagu.targets[0].method=http
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  dagu-data:
  workspace:

networks:
  pangolin:
    external: true
