description: Deploy Docker Compose stacks via Ansible

params:
  - STACKS: ""

working_dir: /home/deploy/dockerlab

steps:
  - name: Pull latest from repo
    command: git pull --ff-only origin main

  - name: Build stack list
    command: |
      if [ -z "${STACKS}" ]; then
        echo "ERROR: STACKS parameter is required"
        exit 1
      fi

      # Convert comma-separated list to JSON array
      echo "${STACKS}" | tr ',' '\n' | sed 's/^ *//;s/ *$//' \
        | awk 'NF' | jq -R . | jq -s .
    output: STACK_LIST

  - call: deploy-stack
    parallel:
      items: ${STACK_LIST}
      max_concurrent: 1
    params: "STACK=${ITEM}"

handler_on:
  failure:
    command: echo "[FAILED] Deploy pipeline — stacks=${STACKS}"
  success:
    command: echo "[OK] Deployed stacks=${STACKS}"

---

name: deploy-stack
description: Deploy a single stack

params:
  - STACK: ""

working_dir: /home/deploy/dockerlab

steps:
  - name: Validate stack directory
    command: |
      if [ ! -d "stacks/${STACK}" ]; then
        echo "ERROR: stacks/${STACK} does not exist"
        exit 1
      fi
      echo "Deploying stack: ${STACK}"

  - name: Resolve target host
    command: |
      source scripts/resolve-changed-stacks.sh
      resolve_host "${STACK}"
    output: ANSIBLE_LIMIT

  - name: Run Ansible deployment
    command: |
      LIMIT_ARGS=""
      if [ "$ANSIBLE_LIMIT" != "all" ] && [ -n "$ANSIBLE_LIMIT" ]; then
        LIMIT_ARGS="--limit $ANSIBLE_LIMIT"
      fi

      cd ansible

      infisical run \
        --domain "$INFISICAL_URL" \
        --token "$INFISICAL_TOKEN" \
        --env prod \
        -- \
        ansible-playbook playbooks/deploy-stacks.yml $LIMIT_ARGS
    env:
      - ANSIBLE_FORCE_COLOR: "true"
      - DEPLOY_STACK: "${STACK}"
    retry_policy:
      limit: 1
      interval_sec: 30
