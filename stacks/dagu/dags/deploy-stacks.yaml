description: Deploy changed Docker Compose stacks via Ansible
type: graph

params:
  - STACKS: ""

working_dir: /opt/dockerlab
#dotenv: false

steps:
  - id: pull_latest
    name: Pull latest from repo
    command: git pull --ff-only origin main

  - id: detect_changes
    name: Detect changed stacks
    depends: pull_latest
    command: |
      if [ -n "${STACKS}" ]; then
        echo "${STACKS}"
        exit 0
      fi

      CHANGED=$(git diff --name-only HEAD~1 HEAD -- stacks/ \
        | cut -d'/' -f2 | sort -u | paste -sd,)

      ANSIBLE_CHANGED=$(git diff --name-only HEAD~1 HEAD -- ansible/ | head -1)

      if [ -n "$ANSIBLE_CHANGED" ]; then
        echo "all"
      elif [ -n "$CHANGED" ]; then
        echo "$CHANGED"
      else
        echo "none"
      fi
    output: CHANGED_STACKS

  - id: check_skip
    name: Check if deploy is needed
    depends: detect_changes
    command: |
      if [ "$CHANGED_STACKS" = "none" ]; then
        echo "No stack or ansible changes detected — skipping."
        exit 1
      fi
      echo "Deploying: $CHANGED_STACKS"
    preconditions:
      - condition: "'$CHANGED_STACKS' != 'none'"
        expected: "true"

  - id: resolve_hosts
    name: Resolve target hosts
    depends: check_skip
    command: |
      source scripts/resolve-changed-stacks.sh
      resolve_hosts "$CHANGED_STACKS"
    output: ANSIBLE_LIMIT

  - id: deploy
    name: Run Ansible deployment
    depends: resolve_hosts
    command: |
      LIMIT_ARGS=""
      if [ "$ANSIBLE_LIMIT" != "all" ] && [ -n "$ANSIBLE_LIMIT" ]; then
        LIMIT_ARGS="--limit $ANSIBLE_LIMIT"
      fi

      cd ansible

      infisical run \
        --domain "$INFISICAL_URL" \
        --client-id "$INFISICAL_CLIENT_ID" \
        --client-secret "$INFISICAL_CLIENT_SECRET" \
        --projectId "$INFISICAL_PROJECT_ID" \
        --env prod \
        -- \
        ansible-playbook playbooks/deploy-stacks.yml $LIMIT_ARGS
    env:
      - ANSIBLE_FORCE_COLOR: "true"
      - CHANGED_STACKS: "${CHANGED_STACKS}"
    retry_policy:
      limit: 1
      interval_sec: 30

handler_on:
  failure:
    command: echo "[FAILED] Deploy pipeline — stacks=${CHANGED_STACKS} hosts=${ANSIBLE_LIMIT}"
  success:
    command: echo "[OK] Deployed stacks=${CHANGED_STACKS} to hosts=${ANSIBLE_LIMIT}"
