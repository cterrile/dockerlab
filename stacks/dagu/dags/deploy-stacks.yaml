description: Deploy Docker Compose stacks via Ansible

env:
  - INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID}
  - REPO_URL: ${REPO_URL}
  - INFISICAL_URL: ${INFISICAL_API_URL}

secrets:
  - name: INFISICAL_TOKEN
    provider: env
    key: INFISICAL_TOKEN

params:
  - STACKS: ""

steps:
  - name: Resolve stacks
    command: |
      # Prefer explicit STACKS param (manual UI trigger),
      # fall back to WEBHOOK_PAYLOAD (GitHub webhook trigger)
      if [ -n "${STACKS}" ]; then
        echo "${STACKS}"
      elif [ -n "${WEBHOOK_PAYLOAD}" ]; then
        echo "${WEBHOOK_PAYLOAD}" | jq -r '.stacks // empty'
      else
        echo "ERROR: No stacks provided via param or webhook payload" >&2
        exit 1
      fi
    output: RESOLVED_STACKS

  - name: Setup SSH
    command: |
      infisical run \
        --domain "$INFISICAL_URL" \
        --token "$INFISICAL_TOKEN" \
        --projectId "$INFISICAL_PROJECT_ID" \
        --env prod \
        -- \
        sh -c '
          set +x
          mkdir -p "$HOME/.ssh" && chmod 700 "$HOME/.ssh"
          printf "%s" "$SSH_PRIVATE_KEY" | install -m 600 /dev/stdin "$HOME/.ssh/id_ed25519"
          unset SSH_PRIVATE_KEY
          ssh-keyscan -t ed25519 github.com >> "$HOME/.ssh/known_hosts" 2>/dev/null
          echo "SSH key written and known_hosts configured"
        '

  - name: Clone repo
    command: |
      if [ -z "${REPO_URL}" ]; then
        echo "ERROR: REPO_URL env var is not set" >&2
        exit 1
      fi
      rm -rf /workspace/dockerlab
      git clone --depth 1 --branch main "${REPO_URL}" /workspace/dockerlab

  - name: Build stack list
    command: |
      if [ -z "${RESOLVED_STACKS}" ]; then
        echo "ERROR: RESOLVED_STACKS is empty" >&2
        exit 1
      fi

      echo "${RESOLVED_STACKS}" | tr ',' '\n' | sed 's/^ *//;s/ *$//' \
        | awk 'NF' | jq -R . | jq -s .
    output: STACK_LIST

  - call: deploy-stack
    parallel:
      items: ${STACK_LIST}
      max_concurrent: 1
    params: "STACK=${ITEM} INFISICAL_URL=${INFISICAL_URL} INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}"

handler_on:
  failure:
    command: echo "[FAILED] Deploy pipeline — stacks=${RESOLVED_STACKS}"
  success:
    command: echo "[OK] Deployed stacks=${RESOLVED_STACKS}"

---

name: deploy-stack
description: Deploy a single stack

secrets:
  - name: INFISICAL_TOKEN
    provider: env
    key: INFISICAL_TOKEN

params:
  - STACK: ""
  - INFISICAL_URL: ""
  - INFISICAL_PROJECT_ID: ""

working_dir: /workspace/dockerlab

steps:
  - name: Validate stack directory
    command: |
      if [ ! -d "stacks/${STACK}" ]; then
        echo "ERROR: stacks/${STACK} does not exist"
        exit 1
      fi
      echo "Deploying stack: ${STACK}"

  - name: Resolve target host
    command: |
      source scripts/resolve-changed-stacks.sh
      resolve_host "${STACK}"
    output: ANSIBLE_LIMIT

  - name: Run Ansible deployment
    command: |
      if [ -z "${INFISICAL_URL}" ]; then
        echo "ERROR: INFISICAL_URL is not set" >&2
        exit 1
      fi

      LIMIT_ARGS=""
      if [ "$ANSIBLE_LIMIT" != "all" ] && [ -n "$ANSIBLE_LIMIT" ]; then
        LIMIT_ARGS="--limit $ANSIBLE_LIMIT"
      fi

      cd ansible

      infisical run \
        --domain "$INFISICAL_URL" \
        --token "$INFISICAL_TOKEN" \
        --projectId "$INFISICAL_PROJECT_ID" \
        --env prod \
        -- \
        /opt/ansible/bin/ansible-playbook playbooks/deploy-stacks.yml $LIMIT_ARGS
    env:
      - ANSIBLE_FORCE_COLOR: "true"
      - ANSIBLE_PRIVATE_KEY_FILE: /home/dagu/.ssh/id_ed25519
      - DEPLOY_STACK: "${STACK}"
    retry_policy:
      limit: 1
      interval_sec: 30
