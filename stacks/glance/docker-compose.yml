services:
  glance:
    container_name: glance
    image: glanceapp/glance
    restart: unless-stopped
    networks:
      - pangolin
    volumes:
      - ./config:/app/config
      - ./assets:/app/assets
      - /etc/localtime:/etc/localtime:ro
      # Optionally, mount docker socket for docker containers widget
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      # Pangolin blueprint (public resource) — see https://docs.pangolin.net/manage/blueprints
      - pangolin.public-resources.glance.name=glance
      - pangolin.public-resources.glance.full-domain=glance.${DOMAIN}
      - pangolin.public-resources.glance.protocol=http
      - pangolin.public-resources.glance.targets[0].hostname=glance
      - pangolin.public-resources.glance.targets[0].port=8080
      - pangolin.public-resources.glance.targets[0].path=/
      - pangolin.public-resources.glance.targets[0].method=http
      # Glance docker-containers widget — see https://github.com/glanceapp/glance/blob/main/docs/configuration.md#docker-containers
      - glance.category=homelab
      - glance.hide=false
      - glance.name=Glance
      - glance.icon=sh:glance
      - glance.url=https://glance.${DOMAIN}
      - glance.description=Dashboard
    #env_file: .env
    environment:
      # Portainer widget — set to the ID in your Portainer URL (e.g. #!/2/docker/dashboard → 2)
      PORTAINER_API_KEY: ${GLANCE_PORTAINER_TOKEN}
      PORTAINER_ENDPOINT_ID: "2"
      DOMAIN: ${DOMAIN}

networks:
  pangolin:
    external: true