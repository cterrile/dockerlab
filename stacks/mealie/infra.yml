host: artemis
deploy_path: /opt/stacks/mealie
env_file: true
secrets:
  - DOMAIN
  - MEALIE_DB_PASSWORD
  - SMTP_HOST
  - SMTP_PORT
  - SMTP_USER
  - SMTP_PASSWORD
  - SMTP_FROM_EMAIL
  - OPENAI_BASE_URL
  - OPENAI_API_KEY
docker_volumes:
  mealie-data:
    backup: true
  mealie-pgdata:
    backup: true
depends_on_stacks: []
